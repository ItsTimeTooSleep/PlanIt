<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 外框：圆形 -->
    <circle class="line" cx="0" cy="0" r="48" 
            stroke-width="5" fill="none"/>
    <!-- 内框：小圆 -->
    <circle class="line" cx="0" cy="0" r="32" 
            stroke-width="4" fill="none"/>
    <!-- 垂直线 -->
    <path class="line" d="M-16 -30 L-16 35" 
          stroke-width="5"/>
    <!-- 水平顶部 -->
    <path class="line" d="M-16 -30 L24 -30" 
          stroke-width="5"/>
    <!-- 右侧短边 -->
    <path class="line" d="M24 -30 L24 -5" 
          stroke-width="5"/>
    <!-- 中间连接 -->
    <path class="line" d="M-16 -5 L16 -5" 
          stroke-width="5"/>
    <!-- 底部短横 -->
    <path class="line" d="M-16 18 L8 18" 
          stroke-width="5"/>
  </g>
</svg>
