<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 外框：三角形 -->
    <path class="line" d="M0 -55 L48 35 L-48 35 Z" 
          stroke-width="5" stroke-linejoin="miter" fill="none"/>
    <!-- 内框：倒三角形 -->
    <path class="line" d="M0 45 L-35 -25 L35 -25 Z" 
          stroke-width="4" stroke-linejoin="miter" fill="none"/>
    <!-- 垂直主干 -->
    <path class="line" d="M-15 -15 L-15 30" 
          stroke-width="5"/>
    <!-- P顶部 -->
    <path class="line" d="M-15 -15 L20 -15 L20 8 L-15 8" 
          stroke-width="5" stroke-linejoin="miter" fill="none"/>
  </g>
</svg>
