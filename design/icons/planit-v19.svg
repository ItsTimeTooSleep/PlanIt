<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 三条交叉轨道 - 更扁平 -->
    <ellipse class="line" cx="0" cy="0" rx="55" ry="14" 
             stroke-width="4" fill="none"/>
    <ellipse class="line" cx="0" cy="0" rx="55" ry="14" 
             stroke-width="4" fill="none" transform="rotate(60)"/>
    <ellipse class="line" cx="0" cy="0" rx="55" ry="14" 
             stroke-width="4" fill="none" transform="rotate(-60)"/>
    <!-- 中心大圆 -->
    <circle class="line" cx="0" cy="0" r="14" 
            stroke-width="5" fill="none"/>
    <!-- 六个节点 - 对称分布 -->
    <circle class="line" cx="0" cy="-55" r="4" 
            stroke="none" fill="currentColor"/>
    <circle class="line" cx="48" cy="27" r="4" 
            stroke="none" fill="currentColor"/>
    <circle class="line" cx="-48" cy="27" r="4" 
            stroke="none" fill="currentColor"/>
    <circle class="line" cx="48" cy="-27" r="3" 
            stroke="none" fill="currentColor" opacity="0.5"/>
    <circle class="line" cx="-48" cy="-27" r="3" 
            stroke="none" fill="currentColor" opacity="0.5"/>
    <circle class="line" cx="0" cy="55" r="3" 
            stroke="none" fill="currentColor" opacity="0.5"/>
  </g>
</svg>
