<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 四条交叉轨道 -->
    <ellipse class="line" cx="0" cy="0" rx="52" ry="16" 
             stroke-width="4" fill="none"/>
    <ellipse class="line" cx="0" cy="0" rx="52" ry="16" 
             stroke-width="4" fill="none" transform="rotate(45)"/>
    <ellipse class="line" cx="0" cy="0" rx="52" ry="16" 
             stroke-width="4" fill="none" transform="rotate(90)"/>
    <ellipse class="line" cx="0" cy="0" rx="52" ry="16" 
             stroke-width="4" fill="none" transform="rotate(135)"/>
    <!-- 中心实心 -->
    <circle class="line" cx="0" cy="0" r="10" 
            stroke="none" fill="currentColor"/>
    <!-- 八个节点 -->
    <circle class="line" cx="0" cy="-52" r="3" 
            stroke="none" fill="currentColor"/>
    <circle class="line" cx="52" cy="0" r="3" 
            stroke="none" fill="currentColor"/>
    <circle class="line" cx="0" cy="52" r="3" 
            stroke="none" fill="currentColor"/>
    <circle class="line" cx="-52" cy="0" r="3" 
            stroke="none" fill="currentColor"/>
    <circle class="line" cx="37" cy="-37" r="3" 
            stroke="none" fill="currentColor" opacity="0.6"/>
    <circle class="line" cx="37" cy="37" r="3" 
            stroke="none" fill="currentColor" opacity="0.6"/>
    <circle class="line" cx="-37" cy="37" r="3" 
            stroke="none" fill="currentColor" opacity="0.6"/>
    <circle class="line" cx="-37" cy="-37" r="3" 
            stroke="none" fill="currentColor" opacity="0.6"/>
  </g>
</svg>
