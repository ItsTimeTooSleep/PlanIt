<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 外框：双层正方形旋转45度 -->
    <path class="line" d="M0 -50 L50 0 L0 50 L-50 0 Z" 
          stroke-width="5" stroke-linejoin="miter" fill="none"/>
    <path class="line" d="M0 -35 L35 0 L0 35 L-35 0 Z" 
          stroke-width="4" stroke-linejoin="miter" fill="none"/>
    <!-- 左侧垂直线 -->
    <path class="line" d="M-20 -30 L-20 35" 
          stroke-width="5"/>
    <!-- 顶部横线 -->
    <path class="line" d="M-20 -30 L20 -30" 
          stroke-width="5"/>
    <!-- 右侧短竖线 -->
    <path class="line" d="M20 -30 L20 -5" 
          stroke-width="5"/>
    <!-- 中间横线 -->
    <path class="line" d="M-20 -5 L10 -5" 
          stroke-width="5"/>
  </g>
</svg>
