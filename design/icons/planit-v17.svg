<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 双层交叉轨道 -->
    <ellipse class="line" cx="0" cy="0" rx="52" ry="18" 
             stroke-width="4" fill="none"/>
    <ellipse class="line" cx="0" cy="0" rx="52" ry="18" 
             stroke-width="4" fill="none" transform="rotate(60)"/>
    <ellipse class="line" cx="0" cy="0" rx="52" ry="18" 
             stroke-width="4" fill="none" transform="rotate(-60)"/>
    <!-- 内层轨道 -->
    <ellipse class="line" cx="0" cy="0" rx="35" ry="12" 
             stroke-width="3" fill="none" opacity="0.5"/>
    <ellipse class="line" cx="0" cy="0" rx="35" ry="12" 
             stroke-width="3" fill="none" opacity="0.5" transform="rotate(60)"/>
    <ellipse class="line" cx="0" cy="0" rx="35" ry="12" 
             stroke-width="3" fill="none" opacity="0.5" transform="rotate(-60)"/>
    <!-- 中心 -->
    <circle class="line" cx="0" cy="0" r="8" 
            stroke-width="5" fill="none"/>
    <!-- 节点 -->
    <circle class="line" cx="0" cy="-52" r="4" 
            stroke="none" fill="currentColor"/>
    <circle class="line" cx="45" cy="26" r="4" 
            stroke="none" fill="currentColor"/>
    <circle class="line" cx="-45" cy="26" r="4" 
            stroke="none" fill="currentColor"/>
  </g>
</svg>
