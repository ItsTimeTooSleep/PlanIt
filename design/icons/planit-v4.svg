<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 菱形外框 - 动态感 -->
    <path class="line" d="M0 -50 L50 0 L0 50 L-50 0 Z" 
          stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 中心竖线 -->
    <path class="line" d="M-15 -35 L-15 35" 
          stroke-width="6" stroke-linecap="round"/>
    <!-- 右侧半圆构成P的上半 -->
    <path class="line" d="M-15 -20 L25 -20 L35 -10 L35 10 L25 20 L5 20" 
          stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 内部小菱形 -->
    <path class="line" d="M0 -15 L15 0 L0 15 L-15 0 Z" 
          stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  </g>
</svg>
