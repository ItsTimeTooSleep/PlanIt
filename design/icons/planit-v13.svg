<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 三层同心圆 - 规划层次 -->
    <circle class="line" cx="0" cy="0" r="50" 
            stroke-width="3" fill="none"/>
    <circle class="line" cx="0" cy="0" r="35" 
            stroke-width="3" fill="none"/>
    <circle class="line" cx="0" cy="0" r="20" 
            stroke-width="3" fill="none"/>
    <!-- 中心核心 -->
    <circle class="line" cx="0" cy="0" r="8" 
            stroke-width="4" fill="none"/>
    <!-- 连接线段 - 规划路径 -->
    <path class="line" d="M0 -50 L0 -35" stroke-width="3"/>
    <path class="line" d="M35 0 L50 0" stroke-width="3"/>
    <path class="line" d="M0 35 L0 50" stroke-width="3"/>
    <path class="line" d="M-50 0 L-35 0" stroke-width="3"/>
  </g>
</svg>
