<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 双层圆形外框 - 层次感 -->
    <circle class="line" cx="0" cy="0" r="50" 
            stroke-width="4" fill="none"/>
    <circle class="line" cx="0" cy="0" r="38" 
            stroke-width="3" fill="none" opacity="0.4"/>
    <!-- 极简P形 - 单一线条构成 -->
    <path class="line" d="M-18 -30 L-18 35" 
          stroke-width="7" stroke-linecap="round"/>
    <path class="line" d="M-18 -30 L22 -30 L35 -15 L35 5 L22 20 L-5 20" 
          stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 装饰点 -->
    <circle class="line" cx="25" cy="-8" r="4" 
            stroke="none" fill="currentColor"/>
  </g>
</svg>
