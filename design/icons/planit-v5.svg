<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #0A0A0A; }
      .line { stroke: #FFFFFF; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FFFFFF; }
      .line { stroke: #0A0A0A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="90"/>
  <g transform="translate(90, 90)">
    <!-- 五边形外框 - 独特感 -->
    <path class="line" d="M0 -50 L48 -15 L30 45 L-30 45 L-48 -15 Z" 
          stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 垂直主干 -->
    <path class="line" d="M-20 -25 L-20 35" 
          stroke-width="6" stroke-linecap="round"/>
    <!-- P的头部 - 折线构成 -->
    <path class="line" d="M-20 -25 L20 -40 L40 -20 L40 0 L20 20 L0 10" 
          stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- 内部分割线 -->
    <path class="line" d="M-20 0 L20 20" 
          stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <path class="line" d="M0 -50 L0 -10" 
          stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
