name: Build Mac App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Node modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
          key: ${{ matrix.target }}

      - name: Cache Tauri build artifacts
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
          key: ${{ runner.os }}-tauri-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock', 'src-tauri/src/**/*') }}
          restore-keys: |
            ${{ runner.os }}-tauri-build-${{ matrix.target }}-
            ${{ runner.os }}-tauri-build-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version
        run: node scripts/sync-version.js

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > private_key.pem
            export TAURI_SIGNING_PRIVATE_KEY="$(cat private_key.pem)"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
          fi
          pnpm tauri build --target ${{ matrix.target }}

      - name: Upload build artifacts (including sig files)
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 7

  generate-latest-json:
    runs-on: macos-latest
    needs: build-mac
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-aarch64-apple-darwin
          path: artifacts/aarch64

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-x86_64-apple-darwin
          path: artifacts/x86_64

      - name: Generate latest.json
        run: |
          echo "=== artifacts/aarch64 ==="
          ls -la artifacts/aarch64/ || true
          ls -la artifacts/aarch64/macos/ 2>/dev/null || true
          echo "=== artifacts/x86_64 ==="
          ls -la artifacts/x86_64/ || true
          ls -la artifacts/x86_64/macos/ 2>/dev/null || true
          mkdir -p sigs
          for sigfile in artifacts/aarch64/macos/*.sig; do
            if [ -f "$sigfile" ]; then
              filename=$(basename "$sigfile")
              newname=$(echo "$filename" | sed 's/PlanIt/PlanIt_aarch64/')
              cp "$sigfile" "sigs/$newname"
              echo "Copied $filename to $newname"
            fi
          done
          for sigfile in artifacts/x86_64/macos/*.sig; do
            if [ -f "$sigfile" ]; then
              filename=$(basename "$sigfile")
              newname=$(echo "$filename" | sed 's/PlanIt/PlanIt_x64/')
              cp "$sigfile" "sigs/$newname"
              echo "Copied $filename to $newname"
            fi
          done
          ls -la sigs/
          node scripts/generate-latest-json.js --empty-notes --empty-windows

      - name: Create Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: 'PlanIt ${{ steps.version.outputs.tag_name }}'
          body: 'See the assets to download this version.'
          draft: true
          prerelease: false
          files: |
            artifacts/aarch64/dmg/*.dmg
            artifacts/aarch64/macos/*.tar.gz
            artifacts/x86_64/dmg/*.dmg
            artifacts/x86_64/macos/*.tar.gz
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-json
          path: latest.json
          retention-days: 7
