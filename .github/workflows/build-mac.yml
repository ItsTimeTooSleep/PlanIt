name: Build Mac App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (aarch64-apple-darwin for Apple Silicon, x86_64-apple-darwin for Intel)'
        required: true
        default: 'aarch64-apple-darwin'
        type: choice
        options:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Node modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
          key: ${{ matrix.target }}

      - name: Cache Tauri build artifacts
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
          key: ${{ runner.os }}-tauri-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock', 'src-tauri/src/**/*') }}
          restore-keys: |
            ${{ runner.os }}-tauri-build-${{ matrix.target }}-
            ${{ runner.os }}-tauri-build-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version
        run: node scripts/sync-version.js

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: |
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" > private_key.pem
            export TAURI_SIGNING_PRIVATE_KEY="$(cat private_key.pem)"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
          fi
          pnpm tauri build --target ${{ matrix.target }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          name: 'PlanIt ${{ github.ref_name }}'
          body: 'See the assets to download this version.'
          draft: true
          prerelease: false
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlanIt-macOS-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          retention-days: 7
